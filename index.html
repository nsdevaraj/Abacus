<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none';">
    <title>Master Abacus Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --color-bg: #f5f7fb;
            --color-surface: #ffffff;
            --color-border: #e5e9f2;
            --color-text: #0f172a;          /* slate-900 */
            --color-text-muted: #475569;    /* slate-600 */
            --color-text-subtle: #94a3b8;   /* slate-400 */
            --color-primary: #4f46e5;       /* indigo-600 */
            --color-primary-soft: #eef2ff;  /* indigo-50  */
            --color-accent: #f59e0b;        /* amber-500 */
        }
        html, body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: var(--color-text);
            background:
              radial-gradient(1200px 600px at -10% -20%, rgba(79,70,229,0.10), transparent 60%),
              radial-gradient(900px 500px at 110% 10%, rgba(236,72,153,0.08), transparent 60%),
              linear-gradient(180deg, #f5f7fb 0%, #eef2ff 100%);
            background-attachment: fixed;
            letter-spacing: -0.005em;
        }
        .dark body {
            background:
              radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,0.18), transparent 60%),
              radial-gradient(900px 500px at 110% 10%, rgba(236,72,153,0.10), transparent 60%),
              linear-gradient(180deg, #0b1020 0%, #111827 100%);
            color: #e5e7eb;
        }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        /* Hidden scrollbar utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Slim, professional scrollbar elsewhere */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-track { background: transparent; }
        /* Focus ring polish */
        :focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; border-radius: 8px; }
    </style>
</head>
  <body>
    <script>
      // FOUC-prevention: apply dark class before React mounts.
      try {
        var stored = localStorage.getItem('abacus_dark_mode');
        var isDark = stored === null ? true : stored === 'true';
        if (isDark) document.documentElement.classList.add('dark');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
